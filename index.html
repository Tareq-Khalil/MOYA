<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOYA – Managing Optimal Yield of Aqua</title>
    <meta name="description" content="MOYA is Egypt's community-driven water management platform. Report water issues, volunteer at real events, play educational games, and help build a better water future." />
    <meta name="keywords" content="MOYA, water management, Egypt, water reporting, volunteer, water conservation, aqua, Nile, water problems, community" />
    <meta name="author" content="MOYA – WaterWorks" />
    <meta name="theme-color" content="#0a74da" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://moyaeg.org/" />
    <meta property="og:title" content="MOYA – Managing Optimal Yield of Aqua" />
    <meta property="og:description" content="Join Egypt's water movement. Report. Track. Change the Flow. 2,100+ reports submitted, 500+ volunteers, 94% resolution rate." />
    <meta property="og:image" content="/logo.png" />
    <meta property="og:site_name" content="MOYA" />
    <meta property="og:locale" content="en_EG" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://moyaeg.org/" />
    <meta name="twitter:title" content="MOYA – Managing Optimal Yield of Aqua" />
    <meta name="twitter:description" content="Egypt's civic water platform. Report issues, volunteer, and play water-themed games to protect Egypt's water future." />
    <meta name="twitter:image" content="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: #062b5b;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      #splash img {
        width: 90px;
        height: auto;
        animation: moya-pulse 1.8s ease-in-out infinite;
      }
      #splash p {
        font-family: 'DM Sans', sans-serif;
        font-size: 0.85rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.5);
      }
      #splash .dot-loader {
        display: flex;
        gap: 6px;
      }
      #splash .dot-loader span {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #00b4d8;
        animation: moya-bounce 1.2s infinite;
      }
      #splash .dot-loader span:nth-child(2) { animation-delay: 0.2s; }
      #splash .dot-loader span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes moya-pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.08); opacity: 0.85; }
      }
      @keyframes moya-bounce {
        0%, 80%, 100% { transform: translateY(0); }
        40% { transform: translateY(-10px); }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/logo.png" alt="MOYA Logo" />
      <p>Managing Optimal Yield of Aqua</p>
      <div class="dot-loader">
        <span></span><span></span><span></span>
      </div>
    </div>
    <div id="root"></div>
    <script>
      window.__hideSplash = function () {
        var splash = document.getElementById('splash');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(function () { splash.remove(); }, 500);
        }
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
